<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            MediCore - Patient Portal
        </div>
        <div class="navbar-links">
            <!-- Populated by ui.js -->
        </div>
    </nav>

    <!-- Profile Section -->
    <div class="section fade-in">
        <div class="dashboard-header">
            <h2>My Profile</h2>
            <a href="patient-dashboard.html" class="btn btn-outline">Back to Dashboard</a>
        </div>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <form id="profileForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address (Read-only)</label>
                    <input type="email" id="email" class="form-control" disabled style="background-color: #f8f9fa;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required minlength="3" maxlength="50">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <!-- Backend requires exact 11 chars -->
                    <input type="tel" id="phone" class="form-control" required minlength="11" maxlength="11" placeholder="11 digits">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="dateOfBirth">Date of Birth</label>
                    <input type="date" id="dateOfBirth" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="updateBtn" style="width: 100%; margin-top: 1rem;">Update Profile</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/patient.js"></script>
    
    <script>
        requireAuth();

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Fetch PatientResponseDTO
                const profile = await getPatientProfile();
                
                document.getElementById('email').value = profile.email || '';
                document.getElementById('name').value = profile.name || '';
                document.getElementById('phone').value = profile.phone || '';
                document.getElementById('dateOfBirth').value = profile.dateOfBirth || '';

            } catch (error) {
                showToast("Failed to load profile data", "error");
            }
        });

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('updateBtn');
            const originalText = btn.textContent;
            btn.textContent = "Updating...";
            btn.disabled = true;

            // Maps exactly to PatientUpdateRequestDTO
            const payload = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                dateOfBirth: document.getElementById('dateOfBirth').value
            };

            const dobValidation = validateDateOfBirth(payload.dateOfBirth);
            if (dobValidation !== true) {
                showToast(dobValidation, "error");
                btn.textContent = originalText;
                btn.disabled = false;
                return;
            }

            try {
                await updatePatientProfile(payload);
                showToast("Profile updated successfully!", "success");
            } catch (error) {
                showToast(error.message || "Failed to update profile", "error");
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
