<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--background-color);
            color: var(--text-color);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-pending   { background-color: #fff3cd; color: #856404; }
        .status-confirmed { background-color: #d4edda; color: #155724; }
        .status-cancelled { background-color: #f8d7da; color: #721c24; }
        .status-completed { background-color: #cce5ff; color: #004085; }
        
        .action-btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 0.5rem;
            transition: var(--transition);
        }
        .btn-approve  { background-color: #2ecc71; color: white; }
        .btn-approve:hover  { background-color: #27ae60; transform: scale(1.05); }
        .btn-complete { background-color: #3498db; color: white; }
        .btn-complete:hover { background-color: #2980b9; transform: scale(1.05); }
        .btn-reject   { background-color: #e74c3c; color: white; }
        .btn-reject:hover   { background-color: #c0392b; transform: scale(1.05); }

        /* Profile card */
        .profile-card {
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .profile-avatar {
            font-size: 3rem;
            width: 70px; height: 70px;
            display: flex; align-items: center; justify-content: center;
            background: #e0f7fa; border-radius: 50%;
        }
        .profile-info h3 { margin: 0 0 0.25rem; }
        .profile-info p  { margin: 0; color: var(--text-light); font-size: 0.9rem; }

        html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
}

        /* Modal Overlay */
.modal-overlay {
  position: fixed;

    top: 0;
    left: 0;

    width: 100vw;
    height: 100vh;

    background: rgba(0,0,0,0.45);

    display: none;

    align-items: center;
    justify-content: center;

    z-index: 9999;

    backdrop-filter: blur(4px);

    overflow: hidden;
}

/* Show Modal */
.modal-overlay.active {
    display: flex;
}

/* Modal Box */
.cancel-modal {

    background: white;

    width: 90%;
    max-width: 500px;

    border-radius: 24px;

    padding: 2rem;

    position: relative;

    box-shadow: 0 20px 40px rgba(0,0,0,0.2);

    animation: modalPop 0.25s ease;

    margin: auto;
}

/* Animation */
@keyframes modalPop {

    from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
    }

    to {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

/* Title */
.cancel-modal h2 {

    color: var(--primary-color);

    margin-bottom: 0.5rem;
}

/* Subtitle */
.modal-text {

    color: var(--text-light);

    margin-bottom: 1rem;

    font-size: 0.95rem;
}

/* Textarea */
.cancel-modal textarea {

    width: 100%;
    min-height: 120px;

    border: 2px solid #e5e7eb;

    border-radius: 16px;

    padding: 1rem;

    resize: vertical;

    font-family: inherit;

    font-size: 0.95rem;

    outline: none;

    transition: 0.2s;
}

/* Focus */
.cancel-modal textarea:focus {

    border-color: var(--primary-color);

    box-shadow: 0 0 0 4px rgba(30,136,168,0.15);
}

/* Send Button */
.send-cancel-btn {

    width: 100%;

    margin-top: 1.2rem;

    background: linear-gradient(
        135deg,
        #e74c3c,
        #c0392b
    );

    color: white;

    border: none;

    padding: 1rem;

    border-radius: 16px;

    font-size: 1rem;
    font-weight: 600;

    cursor: pointer;

    transition: 0.2s;
}

/* Hover */
.send-cancel-btn:hover {

    transform: translateY(-2px);

    box-shadow: 0 10px 20px rgba(231,76,60,0.25);
}

/* Close */
.close-modal {

    position: absolute;

    top: 14px;
    right: 18px;

    border: none;
    background: none;

    font-size: 1.8rem;

    cursor: pointer;

    color: #999;
}

.close-modal:hover {
    color: #333;
}
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            MediCore - Doctor Portal
        </div>
        <div class="navbar-links">
            <!-- Populated by ui.js -->
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="section fade-in">
        <div class="dashboard-header">
            <h2>Doctor Dashboard</h2>
        </div>

        

        <!-- Doctor Profile Card -->
        <div class="profile-card" id="doctorProfileCard">
            <div class="profile-avatar">👨‍⚕️</div>
            <div class="profile-info">
                <h3 id="doctorName">Loading...</h3>
                <p id="doctorSpec">Specialization</p>
                <p id="doctorSchedule">Schedule</p>
            </div>
        </div>

        <div class="card">
            <h3>My Appointments</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patient</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsBody">
                        <tr>
                            <td colspan="6" style="text-align: center;">Loading appointments...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- Cancel Modal -->
<div class="modal-overlay" id="cancelModal">

    <div class="cancel-modal">

        <button class="close-modal"
                onclick="closeCancelModal()">
            &times;
        </button>

        <h2>Cancel Appointment</h2>

        <p class="modal-text">
            The patient will receive the cancellation reason by email.
        </p>

        <textarea
            id="cancelReason"
            placeholder="Write cancellation reason..."
        ></textarea>

        <button
            class="send-cancel-btn"
            id="sendCancelBtn"
            onclick="submitCancellation()"
        >
            Send Cancellation
        </button>

    </div>

</div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/appointments.js"></script>
    
    <script>
        requireAuth();

        // Load doctor profile from GET /api/doctor/me
        async function loadDoctorProfile() {
            try {
                const doc = await apiFetch('/api/doctor/me');
                if (doc) {
                    document.getElementById('doctorName').textContent = 'Dr. ' + (doc.name || 'Unknown');
                    document.getElementById('doctorSpec').textContent = doc.specialization || '';
                    const day   = doc.dayOfWeek ? doc.dayOfWeek.charAt(0) + doc.dayOfWeek.slice(1).toLowerCase() : '';
                    const start = doc.startTime ? doc.startTime.substring(0,5) : '';
                    const end   = doc.endTime   ? doc.endTime.substring(0,5)   : '';
                    document.getElementById('doctorSchedule').textContent =
                        day && start ? `${day}s  ${start} – ${end}` : '';
                }
            } catch(e) {
                // profile load failure is non-fatal
                console.warn('Could not load doctor profile', e);
            }
        }

        async function handleStatusUpdate(id, newStatus) {

    try {

        /* Open modal for cancellation */
        if (newStatus === 'CANCELLED') {

            openCancelModal(id);

            return;
        }

        /* Normal status updates */
        await updateAppointmentStatus(id, newStatus);

        const label =
            newStatus === 'CONFIRMED'
                ? 'confirmed'
                : 'completed';

        showToast(
            `Appointment ${label} successfully`,
            'success'
        );

        loadAppointments();

    } catch (error) {

        showToast(
            error.message || 'Failed to update appointment',
            'error'
        );
    }
    }

        async function loadAppointments() {
            const tbody = document.getElementById('appointmentsBody');
            try {
                const appointments = await getAppointments();
                
                if (!appointments || appointments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No appointments found.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                appointments.forEach(app => {
                    // AppointmentStatus enum: PENDING, CONFIRMED, CANCELLED, COMPLETED
                    const status = (app.status || 'PENDING').toUpperCase();
                    let statusClass = 'status-pending';
                    if (status === 'CONFIRMED') statusClass = 'status-confirmed';
                    else if (status === 'CANCELLED') statusClass = 'status-cancelled';
                    else if (status === 'COMPLETED') statusClass = 'status-completed';

                    let actionsHtml;
                    if (status === 'PENDING') {
                        actionsHtml = `
                            <button class="action-btn btn-approve"  onclick="handleStatusUpdate(${app.id}, 'CONFIRMED')">Confirm</button>
                            <button class="action-btn btn-reject"   onclick="handleStatusUpdate(${app.id}, 'CANCELLED')">Cancel</button>
                        `;
                    } else if (status === 'CONFIRMED') {
                        actionsHtml = `
                            <button class="action-btn btn-complete" onclick="handleStatusUpdate(${app.id}, 'COMPLETED')">Complete</button>
                            <button class="action-btn btn-reject"   onclick="handleStatusUpdate(${app.id}, 'CANCELLED')">Cancel</button>
                        `;
                    } else {
                        actionsHtml = `<span style="color:#888;font-size:0.9rem;">No actions</span>`;
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${app.id || '-'}</td>
                        <td>${app.patientName || '-'}</td>
                        <td>${app.appointmentDate || '-'}</td>
                        <td>${app.appointmentTime || '-'}</td>
                        <td><span class="status-badge ${statusClass}">${status}</span></td>
                        <td>${actionsHtml}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:red;">Failed to load appointments: ${error.message}</td></tr>`;
                showToast('Failed to load appointments', 'error');
            }
        }
        let selectedAppointmentId = null;

/* Open Modal */
function openCancelModal(id) {

    selectedAppointmentId = id;

    document
        .getElementById('cancelModal')
        .classList.add('active');

        document.body.style.overflow = 'hidden';

    document
        .getElementById('cancelReason')
        .value = '';
    
}

/* Close Modal */
function closeCancelModal() {

    document
        .getElementById('cancelModal')
        .classList.remove('active');

    document.body.style.overflow = 'auto';
}

/* Submit */
async function submitCancellation() {

    const reason = document
        .getElementById('cancelReason')
        .value
        .trim();

    if (!reason) {

        showToast(
            'Cancellation reason is required.',
            'error'
        );

        return;
    }

    const btn = document.getElementById('sendCancelBtn');

    btn.disabled = true;
    btn.innerText = 'Sending...';

    try {

        await updateAppointmentStatus(
            selectedAppointmentId,
            'CANCELLED',
            reason
        );

        showToast(
            'Appointment cancelled successfully',
            'success'
        );

        closeCancelModal();

        loadAppointments();

    } catch (error) {

        showToast(
            error.message || 'Cancellation failed',
            'error'
        );

    } finally {

        btn.disabled = false;

        btn.innerText = 'Send Cancellation';
    }
}

        document.addEventListener('DOMContentLoaded', () => {
            loadDoctorProfile();
            loadAppointments();
        });
    </script>
    
</body>
</html>
