<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#0057cd",
        bg: "#f8f9fa",
        border: "#e1e3e4",
        text: "#191c1d",
        muted: "#424655"
      }
    }
  }
}
</script>

</head>

<body class="bg-bg text-text font-[Inter] flex items-center justify-center min-h-screen">

<main class="w-full max-w-lg bg-white p-8 rounded-xl shadow border">

  <!-- HEADER -->
  <div class="text-center mb-6">
    <span class="material-symbols-outlined text-primary text-3xl">medical_services</span>
    <h1 class="text-xl font-bold text-primary">MedCore Systems</h1>
    <p class="text-sm text-muted mt-2">Create your account</p>
  </div>

  <!-- FORM -->
  <form class="space-y-4 text-sm">

    <input type="text" placeholder="Full Name"
      class="w-full border p-2 rounded">

    <input type="email" placeholder="Email"
      class="w-full border p-2 rounded">

    <input type="tel" placeholder="Phone"
      class="w-full border p-2 rounded">

    <div class="grid grid-cols-2 gap-3">
      <input type="password" placeholder="Password"
        class="border p-2 rounded">
      <input type="password" placeholder="Confirm"
        class="border p-2 rounded">
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox">
      <span class="text-muted text-xs">Accept terms</span>
    </div>

    <button class="w-full bg-primary text-white py-2 rounded">
      Register
    </button>

  </form>

  <!-- FOOTER -->
  <p class="text-center text-sm text-muted mt-4">
    Already have an account?
    <a class="text-primary">Login</a>
  </p>

</main>

</body>
</html>
