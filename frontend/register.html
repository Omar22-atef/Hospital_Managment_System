<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            MediCore
        </div>
        <div class="navbar-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html" style="color: var(--primary-color);">Register</a>
        </div>
    </nav>

    <!-- Register Section -->
    <div class="login-container fade-in">
        <div class="card login-card" style="max-width: 500px;">
            <div class="login-header">
                <h2>Create an Account</h2>
                <p style="color: var(--text-light);">Join us to book appointments and manage your health</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john.doe@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+1234567890" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="dateOfBirth">Date of Birth</label>
                    <input type="date" id="dateOfBirth" class="form-control" max="2008-12-31" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" minlength="8" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
            </form>
            
            <div style="text-align: center; margin-top: 2rem; font-size: 0.95rem;">
                Already have an account? <a href="login.html" style="font-weight: 600;">Login here</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
