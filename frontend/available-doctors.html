<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Doctors - Hospital Management System</title>
    <meta name="description" content="Browse our network of experienced medical specialists.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .page-hero { text-align: center; padding: 3rem 1rem 1rem; margin-bottom: 1rem; }
        .page-hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .page-hero p  { color: var(--text-light); max-width: 600px; margin: 0 auto; }

        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .doctor-card {
            text-align: center;
            padding: 2rem;
            border-radius: var(--border-radius);
            background-color: var(--white);
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .doctor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
        }
        .doctor-avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .doctor-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.35rem; color: var(--text-color); }
        .doctor-spec { color: var(--primary-color); font-weight: 500; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .doctor-fee {
            font-size: 1.15rem; font-weight: 700; color: #00838f;
            margin-bottom: 0.75rem;
        }
        .doctor-fee span { font-size: 0.78rem; font-weight: 400; color: #888; }
        .doctor-schedule {
            font-size: 0.88rem;
            color: var(--text-light);
            margin-bottom: 1.25rem;
            border-top: 1px solid #eee;
            padding-top: 0.75rem;
            width: 100%;
            line-height: 1.7;
        }
        .state-box {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
        }
        .state-box p { color: var(--text-light); margin-bottom: 1rem; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">MediCore</div>
        <div class="navbar-links"><!-- Populated by ui.js --></div>
    </nav>

    <!-- Content -->
    <div class="section fade-in">
        <div class="page-hero">
            <h1>Our Medical Specialists</h1>
            <p>Choose from our network of experienced professionals to ensure you receive the best care possible.</p>
        </div>

        <div class="doctors-grid" id="doctorsGrid">
            <div class="state-box"><p>⏳ Loading available doctors...</p></div>
        </div>
    </div>

    <!-- Scripts — no requireAuth() — this page is public -->
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', loadDoctors);

        async function loadDoctors() {
            var grid = document.getElementById('doctorsGrid');
            try {
                // GET /api/patient/doctors
                // SecurityConfig: .requestMatchers(GET, "/api/patient/doctors").permitAll()
                // Returns ApiResponse<List<DoctorResponseDTO>>
                // apiFetch() auto-unwraps .data if ApiResponse wrapper is present
                var doctors = await apiFetch('/api/patient/doctors');

                if (!doctors || doctors.length === 0) {
                    grid.innerHTML = '<div class="state-box"><p>No doctors are currently registered.</p></div>';
                    return;
                }

                grid.innerHTML = '';

                doctors.forEach(function(doc) {
                    // DoctorResponseDTO: id, name, phone, email, specialization, consultationFee,
                    //                    dayOfWeek, startTime, endTime, createdAt, updatedAt
                    var day   = doc.dayOfWeek
                        ? doc.dayOfWeek.charAt(0) + doc.dayOfWeek.slice(1).toLowerCase()
                        : 'Varies';
                    var start = doc.startTime ? doc.startTime.substring(0, 5) : '--:--';
                    var end   = doc.endTime   ? doc.endTime.substring(0, 5)   : '--:--';

                    var feeHtml = doc.consultationFee != null
                        ? '<div class="doctor-fee">$' + parseFloat(doc.consultationFee).toFixed(2) + ' <span>/ consultation</span></div>'
                        : '<div class="doctor-fee" style="color:#aaa;font-size:0.9rem;">Fee not set</div>';

                    var card = document.createElement('div');
                    card.className = 'doctor-card fade-in visible';
                    card.innerHTML =
                        '<div class="doctor-avatar">&#x1F468;&#x200D;&#x2695;&#xFE0F;</div>' +
                        '<div class="doctor-name">Dr. ' + escapeHtml(doc.name || 'Unknown') + '</div>' +
                        '<div class="doctor-spec">' + escapeHtml(doc.specialization || 'General Practitioner') + '</div>' +
                        feeHtml +
                        '<div class="doctor-schedule">' +
                            '<strong>Works on:</strong> ' + day + 's<br>' +
                            '<strong>Hours:</strong> ' + start + ' &ndash; ' + end +
                        '</div>' +
                        '<button class="btn btn-primary" style="width:100%;" onclick="bookDoctor(' + doc.id + ')">Book Appointment</button>';

                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Failed to load doctors:', error);
                var msg = error.message || '';
                if (msg.indexOf('401') !== -1 || msg.indexOf('Unauthorized') !== -1 || msg.indexOf('not logged in') !== -1) {
                    grid.innerHTML =
                        '<div class="state-box">' +
                        '<p>You must be logged in to view the doctors list.</p>' +
                        '<a href="login.html" class="btn btn-primary">Log In</a>' +
                        '</div>';
                } else {
                    grid.innerHTML =
                        '<div class="state-box" style="color:#c0392b;">' +
                        '<p>Failed to load doctors: ' + escapeHtml(msg || 'Unknown error') + '</p>' +
                        '<button class="btn btn-outline" onclick="loadDoctors()">Retry</button>' +
                        '</div>';
                    showToast('Failed to load doctors: ' + (msg || 'Unknown error'), 'error');
                }
            }
        }

        function bookDoctor(id) {
            var token = localStorage.getItem('token');
            if (!token) { window.location.href = 'login.html'; return; }
            window.location.href = 'book-appointment.html?doctor=' + id;
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
