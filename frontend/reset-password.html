<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            🏥 HMS Care
        </div>
        <div class="navbar-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <!-- Reset Password Section -->
    <div class="login-container fade-in">
        <div class="card login-card">
            <div class="login-header">
                <h2>Reset Password</h2>
                <p style="color: var(--text-light);">Enter the OTP sent to your email and your new password</p>
            </div>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john.doe@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">Role</label>
                    <select id="role" class="form-control" required style="cursor: pointer; background-color: #fff;">
                        <option value="PATIENT">Patient</option>
                        <option value="DOCTOR">Doctor</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="otpCode">OTP Code</label>
                    <input type="text" id="otpCode" class="form-control" placeholder="123456" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Reset Password</button>
            </form>
            
            <div style="text-align: center; margin-top: 2rem; font-size: 0.95rem;">
                Remember your password? <a href="login.html" style="font-weight: 600;">Login here</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

    <!-- Script to pre-fill email and role if available -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const storedEmail = sessionStorage.getItem('resetEmail');
            const storedRole = sessionStorage.getItem('resetRole');
            
            if (storedEmail) {
                document.getElementById('email').value = storedEmail;
            }
            if (storedRole) {
                document.getElementById('role').value = storedRole;
            }
        });
    </script>
</body>
</html>
