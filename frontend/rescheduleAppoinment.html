<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reschedule Appointment</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#0057cd",
        bg: "#f8f9fa",
        border: "#e1e3e4",
        text: "#191c1d",
        muted: "#424655"
      }
    }
  }
}
</script>

</head>

<body class="bg-bg text-text font-[Inter] flex flex-col min-h-screen">

<!-- NAV -->
<header class="flex justify-between items-center px-6 h-16 bg-white border-b shadow-sm">
  <h1 class="text-xl font-bold text-primary">MedCore Systems</h1>

  <div class="flex items-center gap-4">
    <span class="material-symbols-outlined">notifications</span>
    <span class="material-symbols-outlined">settings</span>
    <img class="w-8 h-8 rounded-full"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAvd85QXCLQoOCPbwtmYjXcxaYYwG2vHgiiQAs8dbW9wxHXcPisHgg--a3bkgxXz0Vzi1uS2JPPmN6R4jn3kWamxDxZDeBkxnsU7LghOuvo-uN_XHMKpHlTc5cDh89gLDfQ3cOjEbP7kxDSXUJeiP3jMDEPyDGOgQG8ok4wTHGRYFD-m8ycYxcPXIf6CjdrUOsDz36qNQKb2SP_9DO2O0OtI5usZFaq_mJI6SbfZDQu1jfnDdemWv6WOoRDYeCxKe1ac622fR-zVI">
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-8 flex-grow grid lg:grid-cols-3 gap-6">

<!-- LEFT -->
<section class="space-y-6">

  <div>
    <a class="text-primary text-sm">← Back</a>
    <h1 class="text-2xl font-bold">Reschedule Appointment</h1>
    <p class="text-muted text-sm">Choose a new date and time.</p>
  </div>

  <!-- CURRENT -->
  <div class="bg-white p-4 rounded shadow">
    <h3 class="font-semibold mb-2">Current Appointment</h3>
    <p>Dr. Sarah Jenkins</p>
    <p class="text-sm text-muted">Oct 26 • 10:30 AM</p>
    <p class="text-sm text-muted">Main Hospital</p>
  </div>

</section>

<!-- RIGHT -->
<section class="lg:col-span-2 space-y-6">

  <!-- DATE -->
  <div class="bg-white p-6 rounded shadow">
    <h3 class="font-semibold mb-4">Select Date</h3>

    <div class="grid grid-cols-7 gap-2 text-center text-sm">
      <button class="p-2">1</button>
      <button class="p-2">2</button>
      <button class="p-2">3</button>
      <button class="p-2 bg-primary text-white rounded-full">9</button>
      <button class="p-2">10</button>
    </div>
  </div>

  <!-- TIME -->
  <div class="bg-white p-6 rounded shadow">
    <h3 class="font-semibold mb-4">Select Time</h3>

    <div class="grid grid-cols-3 gap-3 text-sm">
      <button class="border p-2 rounded">09:00</button>
      <button class="border p-2 rounded">09:30</button>
      <button class="bg-primary text-white p-2 rounded">10:00</button>
      <button class="border p-2 rounded">11:00</button>
      <button class="border p-2 rounded opacity-50 line-through">01:00</button>
      <button class="border p-2 rounded">02:30</button>
    </div>
  </div>

  <!-- REASON -->
  <div class="bg-white p-6 rounded shadow">
    <textarea class="w-full border p-3 rounded" placeholder="Reason (optional)"></textarea>
  </div>

  <!-- ACTIONS -->
  <div class="flex justify-end gap-3">
    <button class="border px-6 py-2 rounded">Cancel</button>
    <button class="bg-primary text-white px-6 py-2 rounded" onclick="location.href='appointmentDetails.html'">
      Confirm Reschedule
    </button>
  </div>

</section>

</main>

<footer class="border-t text-center p-6 text-sm text-muted">
  © 2024 MedCore Systems
</footer>

</body>
</html>
