<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="navbar-brand">
        MediCore
    </div>
    <div class="navbar-links">
        <!-- Populated by ui.js -->
    </div>
</nav>

<!-- Book Appointment Section -->
<div class="login-container fade-in">

    <div class="card login-card" style="max-width: 500px;">

        <div class="login-header">
            <h2>Book an Appointment</h2>
            <p style="color: var(--text-light);">
                Schedule a visit with our expert doctors
            </p>
        </div>

        <form id="bookAppointmentForm">

            <div class="form-group">
                <label class="form-label" for="doctorId">
                    Select Doctor
                </label>
                <select
                        id="doctorId"
                        class="form-control"
                        required
                        style="cursor: pointer; background-color: #fff;"
                >
                    <option value="" disabled selected>
                        Loading doctors...
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="doctorDay">
                    Doctor Working Day
                </label>
                <input
                        type="text"
                        id="doctorDay"
                        class="form-control"
                        disabled
                        style="background-color: #f5f7fa;"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="doctorTime">
                    Doctor Working Time
                </label>
                <input
                        type="text"
                        id="doctorTime"
                        class="form-control"
                        disabled
                        style="background-color: #f5f7fa;"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="appointmentDate">
                    Appointment Date
                </label>
                <input
                        type="date"
                        id="appointmentDate"
                        class="form-control"
                        required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="timeSlot">
                    Available Time Slots
                </label>
                <select
                        id="timeSlot"
                        class="form-control"
                        required
                        style="cursor: pointer; background-color: #fff;"
                >
                    <option value="" disabled selected>
                        -- Select Date First --
                    </option>
                </select>
            </div>

            <button
                    type="submit"
                    class="btn btn-primary"
                    id="submitBtn"
                    style="width: 100%; margin-top: 1rem;"
            >
                Confirm Booking
            </button>

            <a
                    href="patient-dashboard.html"
                    class="btn btn-outline"
                    style="
                        width: 100%;
                        margin-top: 0.7rem;
                        display: block;
                        text-align: center;
                    "
            >
                Cancel
            </a>

        </form>

    </div>

</div>

<!-- Scripts -->
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/appointments.js"></script>

<script>

    requireAuth();

    const doctorSelect =
        document.getElementById("doctorId");

    const doctorDayInput =
        document.getElementById("doctorDay");

    const doctorTimeInput =
        document.getElementById("doctorTime");

    const slotSelect =
        document.getElementById("timeSlot");

    let appointmentDateInput =
        document.getElementById("appointmentDate");

    let doctors = [];

    /*
    ============================================
    LOAD DOCTORS
    ============================================
    */

    async function loadDoctors() {

        try {

            const response =
                await apiFetch("/api/patient/doctors");

            doctors = response.data || response;

            doctorSelect.innerHTML =
                `<option value="">-- Choose a Doctor --</option>`;

            doctors.forEach((doctor) => {

                const option =
                    document.createElement("option");

                option.value = doctor.id;

                option.textContent =
                    `${doctor.name} (${doctor.specialization})`;

                // Preselect if coming from available-doctors.html
                const urlParams = new URLSearchParams(window.location.search);
                const preselectedDoctor = urlParams.get('doctor');
                if (preselectedDoctor && preselectedDoctor == doctor.id) {
                    option.selected = true;
                }

                doctorSelect.appendChild(option);
            });
            
            // Trigger change if preselected
            if (doctorSelect.value) {
                doctorSelect.dispatchEvent(new Event('change'));
            }

        } catch (error) {

            showToast(
                error.message || "Failed to load doctors",
                "error"
            );
        }
    }

    /*
    ============================================
    GENERATE 30 MINUTE SLOTS
    ============================================
    */

    function generateSlots(startTime, endTime) {
        const slots = [];

        let [startHour, startMinute] = startTime.split(":").map(Number);
        let [endHour, endMinute] = endTime.split(":").map(Number);

        let currentTotalMinutes = startHour * 60 + startMinute;
        let endTotalMinutes = endHour * 60 + endMinute;

        // Handle overnight shifts where end time is the next day
        if (endTotalMinutes <= currentTotalMinutes) {
            endTotalMinutes += 24 * 60;
        }

        while (currentTotalMinutes < endTotalMinutes) {
            let h = Math.floor(currentTotalMinutes / 60) % 24;
            let m = currentTotalMinutes % 60;

            const hours = String(h).padStart(2, "0");
            const minutes = String(m).padStart(2, "0");

            slots.push(`${hours}:${minutes}:00`); // Ensure HH:mm:ss for backend

            currentTotalMinutes += 30;
        }

        return slots;
    }

    /*
    ============================================
    WHEN DOCTOR CHANGES
    ============================================
    */

    doctorSelect.addEventListener("change", async () => {

        const doctorId = doctorSelect.value;

        if (!doctorId) return;

        const doctor =
            doctors.find(d => d.id == doctorId);

        if (!doctor) return;

        /*
        Expected Backend Fields:
        workingDay
        startTime
        endTime
        */

        doctorDayInput.value =
            doctor.dayOfWeek;

        doctorTimeInput.value =
            `${doctor.startTime} - ${doctor.endTime}`;

        /*
        ============================================
        ALLOW ONLY NEXT 7 DAYS
        ============================================
        */

        const today = new Date();

        const nextWeek = new Date();

        nextWeek.setDate(today.getDate() + 7);

        appointmentDateInput.min =
            today.toISOString().split("T")[0];

        appointmentDateInput.max =
            nextWeek.toISOString().split("T")[0];

        /*
        ============================================
        ALLOW ONLY DOCTOR WORKING DAY
        ============================================
        */

        const doctorDay = doctor.dayOfWeek.toUpperCase();
        const dayMap = {
            SUNDAY: 0, MONDAY: 1, TUESDAY: 2,
            WEDNESDAY: 3, THURSDAY: 4, FRIDAY: 5, SATURDAY: 6
        };
        const allowedDay = dayMap[doctorDay];

        // Reset slots when doctor changes
        slotSelect.innerHTML = '<option value="">-- Select Date First --</option>';
        appointmentDateInput.value = '';

        // Remove any previously attached listener by cloning the element
        const freshDateInput = appointmentDateInput.cloneNode(true);
        appointmentDateInput.parentNode.replaceChild(freshDateInput, appointmentDateInput);
        
        // Update the module-level reference to the new active DOM node
        appointmentDateInput = freshDateInput;

        /*
        ============================================
        DATE CHANGE → VALIDATE DAY + LOAD DATE-SCOPED SLOTS
        ============================================
        */
        appointmentDateInput.addEventListener('change', async () => {
            const selectedValue = appointmentDateInput.value;
            if (!selectedValue) return;

            // Parse locally to avoid UTC-shift (new Date('YYYY-MM-DD') is UTC midnight)
            const [y, m, d] = selectedValue.split('-').map(Number);
            const localDate = new Date(y, m - 1, d);

            if (localDate.getDay() !== allowedDay) {
                const dayLabel = doctorDay.charAt(0) + doctorDay.slice(1).toLowerCase();
                showToast('Doctor is only available on ' + dayLabel + 's', 'error');
                dateInputEl.value = '';
                slotSelect.innerHTML = '<option value="">-- Select Date First --</option>';
                return;
            }

            // Valid day — load booked slots for THIS doctor on THIS date
            slotSelect.innerHTML = '<option value="">Loading slots...</option>';
            slotSelect.disabled = true;

            try {
                // GET /api/appointments/booked-slots/{doctorId}?date=YYYY-MM-DD
                const bookedSlots = await getBookedSlots(doctorId, selectedValue);
                const allSlots    = generateSlots(doctor.startTime, doctor.endTime);

                slotSelect.innerHTML = '<option value="">-- Select Time Slot --</option>';
                slotSelect.disabled  = false;

                let hasAvailable = false;
                allSlots.forEach(slot => {
                    const isBooked = bookedSlots && bookedSlots.includes(slot);
                    const option   = document.createElement('option');
                    option.value   = slot;
                    option.textContent = slot.substring(0, 5) + (isBooked ? ' (booked)' : '');
                    option.disabled    = isBooked;
                    if (isBooked) option.style.color = '#aaa';
                    slotSelect.appendChild(option);
                    if (!isBooked) hasAvailable = true;
                });

                if (!hasAvailable) {
                    slotSelect.innerHTML = '<option value="">No slots available on this date</option>';
                }
            } catch (error) {
                slotSelect.disabled = false;
                slotSelect.innerHTML = '<option value="">Failed to load slots</option>';
                showToast('Failed to load available slots', 'error');
            }
        });
    });

    /*
    ============================================
    BOOK APPOINTMENT
    ============================================
    */

    document
        .getElementById("bookAppointmentForm")
        .addEventListener("submit", async (e) => {

            e.preventDefault();

            const doctorId =
                doctorSelect.value;

            const appointmentDate =
                appointmentDateInput.value;

            const appointmentTime =
                slotSelect.value;


            if (
                !doctorId ||
                !appointmentDate ||
                !appointmentTime
            ) {

                showToast(
                    "Please complete all fields",
                    "error"
                );

                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.textContent = "Checking availability...";
            btn.disabled = true;

            try {
                // Duplicate booking prevention
                const existingAppointments = await apiFetch('/api/patient/appointments');
                if (existingAppointments && Array.isArray(existingAppointments)) {
                    const hasDuplicate = existingAppointments.some(app => 
                        app.doctorId == doctorId && 
                        (app.appointmentDate === appointmentDate || app.date === appointmentDate) &&
                        // AppointmentStatus enum: PENDING, CONFIRMED, CANCELLED, COMPLETED
                        (app.status === 'PENDING' || app.status === 'CONFIRMED')
                    );
                    
                    if (hasDuplicate) {
                        showToast("You already have an appointment with this doctor on the selected date.", "error");
                        btn.textContent = originalText;
                        btn.disabled = false;
                        return;
                    }
                }
            } catch (err) {
                // If it fails to fetch existing appointments, we will just proceed and let the backend decide
                console.warn("Could not fetch existing appointments for duplicate check", err);
            }

            btn.textContent = "Booking...";

            try {
                // Must perfectly match AppointmentRequestDTO
                await apiFetch(
                    "/api/appointments/book",
                    {
                        method: "POST",

                        body: JSON.stringify({

                            doctorId: parseInt(doctorId),

                            appointmentDate: appointmentDate,

                            appointmentTime: appointmentTime // HH:mm:ss format generated
                        })
                    }
                );

                showToast(
                    "Appointment booked successfully",
                    "success"
                );

                setTimeout(() => {

                    window.location.href =
                        "patient-dashboard.html";

                }, 1500);

            } catch (error) {

                showToast(
                    error.message ||
                    "Booking failed",
                    "error"
                );
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

    /*
    ============================================
    INIT
    ============================================
    */

    document.addEventListener(
        "DOMContentLoaded",
        () => {

            loadDoctors();
        }
    );

</script>

</body>
</html>
