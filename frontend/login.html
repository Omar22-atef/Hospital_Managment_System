<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hospital Management System</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            MediCore
        </div>
        <div class="navbar-links">
            <a href="index.html">Home</a>
            <a href="login.html" style="color: var(--primary-color);">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="login-container fade-in">
        <div class="card login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p style="color: var(--text-light);">Please enter your credentials to login</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john.doe@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="form-group" style="text-align: right;">
                    <a href="forgot-password.html" style="font-size: 0.9rem;">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
            
            <div style="text-align: center; margin-top: 2rem; font-size: 0.95rem;">
                Don't have an account? <a href="register.html" style="font-weight: 600;">Register here</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
